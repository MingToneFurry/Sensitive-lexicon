name: daily-sync-upstream

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Sync upstream
        env:
          UPSTREAM_REPO: https://github.com/Konsheng/Sensitive-lexicon.git
        run: |
          git remote add upstream "$UPSTREAM_REPO" || true
          git fetch upstream
          git merge --no-edit upstream/main || true
      - name: Build latest server
        run: go build -trimpath -o sensitive-server ./cmd/server
      - name: Commit synced result
        run: |
          git add .
          git diff --cached --quiet || git commit -m "chore: daily upstream sync and rebuild"
          git push
