name: build-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        go-version: ['1.22.x', '1.23.x']
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test
        run: go test ./...
      - name: Build
        # Use bash on all platforms so the EXT variable works on Windows too.
        shell: bash
        run: |
          mkdir -p dist
          EXT=""
          if [ "${{ runner.os }}" = "Windows" ]; then EXT=".exe"; fi
          go build -trimpath -ldflags "-s -w" \
            -o "dist/sensitive-server-${{ runner.os }}-${{ matrix.go-version }}${EXT}" \
            ./cmd/server
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sensitive-server-${{ runner.os }}-${{ matrix.go-version }}
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish Release assets
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          files: artifacts/**
