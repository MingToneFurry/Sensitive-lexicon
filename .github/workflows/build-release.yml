name: build-release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Test
        run: go test ./...

      - name: Build
        shell: bash
        run: |
          mkdir -p dist
          EXT=""
          if [ "${{ runner.os }}" = "Windows" ]; then EXT=".exe"; fi
          go build -trimpath -ldflags "-s -w" \
            -o "dist/sensitive-server-${{ runner.os }}${EXT}" \
            ./cmd/server

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sensitive-server-${{ runner.os }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-${{ github.run_number }}
          target_commitish: ${{ github.sha }}
          name: main build #${{ github.run_number }}
          generate_release_notes: true
          files: artifacts/**
