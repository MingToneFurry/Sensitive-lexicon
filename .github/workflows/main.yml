name: build-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.22.x', '1.23.x']
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Test
        run: go test ./...

      - name: Build
        shell: bash
        run: |
          mkdir -p dist
          BIN_NAME="sensitive-gateway"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            BIN_NAME="${BIN_NAME}.exe"
          fi
          go build -trimpath -ldflags="-s -w" -o "dist/${BIN_NAME}" ./cmd/server

      - name: Package
        shell: bash
        run: |
          cd dist
          ARCHIVE="sensitive-lexicon-${{ runner.os }}-go${{ matrix.go }}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            powershell -Command "Compress-Archive -Path * -DestinationPath ${ARCHIVE}.zip"
          else
            tar -czf "${ARCHIVE}.tar.gz" *
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sensitive-lexicon-${{ runner.os }}-go${{ matrix.go }}
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
